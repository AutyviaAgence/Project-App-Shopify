# Config de l'app PUBLIQUE (distribution Shopify App Store).
#
# ⚠️ NE PAS CONFONDRE avec shopify.app.xeyo-whatsapp-support-chat.toml, qui est
# l'ANCIENNE app, verrouillée en « distribution personnalisée » (choix
# irréversible côté Shopify : impossible de la publier sur l'App Store, même par
# le support). Elle n'est gardée que pour référence/rollback.
# C'est CE fichier qui fait foi désormais :
#     shopify app deploy --config xeyo-app-store
#
# Voir docs/SHOPIFY_COMPLIANCE.md.

client_id = "f9d37d1f9ab1427165874c33eb7c4926"
name = "Xeyo - WhatsApp Support & Chat"
application_url = "https://app.xeyo.io/shopify"
embedded = true

[webhooks]
api_version = "2026-07"

  # Désinstallation : purge du token et désactivation de la boutique.
  # ⚠️ URL ABSOLUE obligatoire. Une URI relative ("/api/...") est concaténée par
  # Shopify à `application_url` — qui vaut ici `https://app.xeyo.io/shopify` — et
  # produit `https://app.xeyo.io/shopify/api/shopify/webhooks/app-uninstalled`,
  # une route qui n'existe pas : le webhook part en 404, le token n'est jamais
  # purgé et la boutique reste active en base après désinstallation.
  [[webhooks.subscriptions]]
  uri = "https://app.xeyo.io/api/shopify/webhooks/app-uninstalled"
  topics = [ "app/uninstalled" ]

  # ── Webhooks de conformité RGPD — OBLIGATOIRES pour l'App Store ────────────
  # Syntaxe canonique : `compliance_topics` (et NON `topics`, qui fait répondre le
  # serveur « The following topic is invalid », ni une section
  # [webhooks.privacy_compliance]). ⚠️ `shopify app config validate` NE détecte
  # PAS l'erreur — seul le `deploy` la rejette.
  [[webhooks.subscriptions]]
  uri = "https://app.xeyo.io/api/shopify/webhooks/customers-data-request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "https://app.xeyo.io/api/shopify/webhooks/customers-redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "https://app.xeyo.io/api/shopify/webhooks/shop-redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
# ⚠️ Le .toml fait foi, PAS la variable d'env SHOPIFY_SCOPES. Après tout ajout de
# scope : `deploy` + RÉINSTALLATION de l'app sur la boutique + reregister-webhooks,
# sinon les appels concernés tombent en 403.
# `read_discounts` est volontairement absent : on ne fait que CRÉER des remises.
# `read_all_orders` : scope PRIVILÉGIÉ, approuvé par Shopify le 13 juill. 2026
# (Partner Dashboard → Demandes d'accès à l'API → « auto granted scope »).
# Sans lui, `read_orders` plafonne l'Admin API aux 60 derniers jours et l'API
# tronque SILENCIEUSEMENT au-delà. Il est indispensable au SAV (répondre sur une
# commande ancienne) et à l'attribution du CA sur des cycles d'achat longs.
# ⚠️ NE PAS ajouter `write_checkout_extensions_apis` ici.
#
# On a failli le faire : nos 2 extensions checkout déclarent `api_access = true`,
# ce qui ressemble à un besoin de scope. C'est faux. `api_access` donne accès à la
# STOREFRONT API, et « Shopify handles the authentication for all API calls from an
# extension » — aucun scope à déclarer. Quant à `applyAttributeChange`, il fait
# partie de l'API standard des extensions checkout, sans scope non plus.
#
# `write_checkout_extensions_apis` est un scope PRIVILÉGIÉ, demandé via le Partner
# Dashboard (Access requests). L'écrire à la main dans ce fichier fait échouer le
# `deploy` avec « These scopes are invalid ».
scopes = "read_all_orders,read_content,read_customers,read_fulfillments,read_legal_policies,read_orders,read_products,read_returns,write_discounts,write_orders"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://app.xeyo.io/api/shopify/callback" ]

# ⚠️ PIÈGE : `subpath` et `prefix` sont FIGÉS AU MOMENT DE L'INSTALLATION.
# Shopify : « Changes to the subpath and prefix in your app will only apply to NEW
# app installations. […] You can also uninstall and reinstall the app to
# reinitialize the proxied path. »
#
# Autrement dit : modifier ces valeurs puis faire `shopify app deploy` NE SUFFIT
# PAS. Sur une boutique déjà installée, Shopify continue d'ignorer le proxy et
# renvoie 404 sur /apps/xeyo/* — alors que le backend répond parfaitement en direct.
# Symptôme vécu : la bulle WhatsApp ne s'affichait jamais (son fetch tombait en 404).
#
# ➜ Après toute modification ici : DÉSINSTALLER puis RÉINSTALLER l'app sur chaque
#   boutique de test. Il n'y a pas d'autre moyen.
[app_proxy]
url = "https://app.xeyo.io/api/shopify/proxy"
subpath = "xeyo"
prefix = "apps"
