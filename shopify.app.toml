# Configuration de l'app Shopify Xeyo (pour Shopify CLI).
# La plupart des valeurs proviennent du Partner Dashboard ; ce fichier sert
# de référence et au déploiement des extensions (theme app extension).
# Remplace client_id par ta vraie SHOPIFY_API_KEY lors de `shopify app config link`.

name = "Xeyo — WhatsApp Support & Chat"
application_url = "https://app.xeyo.io/shopify"
embedded = true

[access_scopes]
scopes = "read_products,read_content,read_orders,read_customers"

[auth]
redirect_urls = [
  "https://app.xeyo.io/api/shopify/callback"
]

# App Proxy : permet à la vitrine du marchand d'appeler Xeyo via
# https://{boutique}.myshopify.com/apps/xeyo/...  → proxie vers app.xeyo.io
[app_proxy]
url = "https://app.xeyo.io/api/shopify/proxy"
subpath = "xeyo"
prefix = "apps"

[webhooks]
api_version = "2025-01"
