# ⚠️ ANCIENNE app — « Xeyo - Testing app custom » (dev/test uniquement).
#
# Verrouillée en « distribution personnalisée » : ce choix est IRRÉVERSIBLE côté
# Shopify (même le support ne peut pas la basculer en publique). Elle ne pourra
# donc JAMAIS être installée par un marchand extérieur, ni utiliser la Billing API.
#
# ➜ L'app qui sera distribuée est dans shopify.app.xeyo-app-store.toml.
#    Ne déploie ce fichier-ci que pour tester sur la boutique de dev :
#        shopify app deploy --config xeyo-testing-custom
#
# Voir docs/SHOPIFY_COMPLIANCE.md.

client_id = "7510fef84b3b8bd4440344e9f6b626d4"
name = "Xeyo - Testing app custom"
application_url = "https://app.xeyo.io/shopify"
embedded = true

[webhooks]
api_version = "2026-04"

  # Désinstallation : purge du token et désactivation de la boutique.
  [[webhooks.subscriptions]]
  # URL ABSOLUE : une URI relative est concaténée à `application_url` et donne
  # `.../shopify/api/shopify/webhooks/...` → 404. Cf. xeyo-app-store.toml.
  uri = "https://app.xeyo.io/api/shopify/webhooks/app-uninstalled"
  topics = [ "app/uninstalled" ]

  # ── Webhooks de conformité RGPD — OBLIGATOIRES ─────────────────────────────
  # Shopify refuse la soumission sans eux. Syntaxe canonique : `compliance_topics`
  # (et NON `topics`, qui renvoie « The following topic is invalid », ni une section
  # [webhooks.privacy_compliance]). Les routes existent et vérifient le HMAC.
  # Confirmé enregistré côté Shopify via `shopify app config pull`.
  [[webhooks.subscriptions]]
  uri = "https://app.xeyo.io/api/shopify/webhooks/customers-data-request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "https://app.xeyo.io/api/shopify/webhooks/customers-redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "https://app.xeyo.io/api/shopify/webhooks/shop-redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# ⚠️ Doit rester aligné sur SHOPIFY_SCOPES (src/lib/shopify/client.ts) : si le code
# demande moins que le toml, les appels correspondants échouent en 403 en prod.
# `read_discounts` a été retiré (jamais utilisé : on CRÉE des remises, d'où write_).
scopes = "read_content,read_customers,read_fulfillments,read_legal_policies,read_orders,read_products,read_returns,write_discounts,write_orders"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://app.xeyo.io/api/shopify/callback" ]

[app_proxy]
url = "https://app.xeyo.io/api/shopify/proxy"
subpath = "xeyo"
prefix = "apps"
