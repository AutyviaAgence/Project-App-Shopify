# Checkout UI Extension — Opt-in WhatsApp sur la page de remerciement (Thank You)
# S'affiche après l'achat. Le client coche pour recevoir le suivi sur WhatsApp.
api_version = "2025-01"

[[extensions]]
name = "Xeyo — Opt-in WhatsApp (page Merci)"
handle = "xeyo-thankyou-optin"
type = "ui_extension"

  [[extensions.targeting]]
  module = "./src/ThankYou.jsx"
  target = "purchase.thank-you.block.render"

  [extensions.capabilities]
  api_access = true
  network_access = true
