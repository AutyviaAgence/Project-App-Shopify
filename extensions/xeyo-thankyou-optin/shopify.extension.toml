# Checkout UI Extension — Opt-in WhatsApp sur la page de remerciement (Thank You)
# S'affiche après l'achat. Le client coche pour recevoir le suivi sur WhatsApp.
api_version = "2025-07"

[[extensions]]
name = "Xeyo — Opt-in WhatsApp (page Merci)"
handle = "xeyo-thankyou-optin"

uid = "8900acf1-c503-d000-d085-d9e6f7d280023d11b5cc"
type = "ui_extension"

  [[extensions.targeting]]
  module = "./src/ThankYou.js"
  target = "purchase.thank-you.block.render"

  # Opt-in PENDANT le checkout (sous le champ contact) → capture le consentement
  # avant un éventuel abandon, ce qui rend possible la relance de panier abandonné.
  [[extensions.targeting]]
  module = "./src/Checkout.js"
  target = "purchase.checkout.contact.render-after"

  [extensions.capabilities]
  api_access = true
  # Requis : l'extension envoie l'opt-in et lit le téléphone via l'App Proxy (fetch).
  network_access = true
