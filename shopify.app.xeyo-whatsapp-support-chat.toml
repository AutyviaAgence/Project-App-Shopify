# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "7510fef84b3b8bd4440344e9f6b626d4"
name = "Xeyo - WhatsApp Support & Chat"
application_url = "https://app.xeyo.io/shopify"
embedded = true

# NB — Politique de confidentialité & URL de support : ces champs NE SONT PAS des
# clés du toml (la CLI les rejette). Ils se renseignent dans le Partner Dashboard,
# section « App listing » :
#   · Privacy policy : https://app.xeyo.io/privacy
#   · Support / contact : (à renseigner)

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# ⚠️ Shopify rejette les scopes NON UTILISÉS. `read_discounts` a été retiré : le code
# ne lit jamais les remises, il en CRÉE (discountCodeBasicCreate) → write_discounts suffit.
# Cette liste doit rester alignée sur SHOPIFY_SCOPES (src/lib/shopify/client.ts),
# sinon les scopes demandés à l'OAuth diffèrent de ceux déclarés → 403 en prod.
scopes = "read_customers,write_discounts,read_orders,write_orders,read_products,read_content,read_legal_policies,read_returns,read_fulfillments"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://app.xeyo.io/api/shopify/callback" ]

[app_proxy]
url = "https://app.xeyo.io/api/shopify/proxy"
subpath = "xeyo"
prefix = "apps"

[webhooks]
api_version = "2026-04"

# ── Webhooks de conformité RGPD — OBLIGATOIRES ────────────────────────────────
# Shopify REFUSE la soumission d'une app sans ces 3 endpoints. Ils ont leur PROPRE
# section (`privacy_compliance`) : les déclarer en [[webhooks.subscriptions]] est
# rejeté (« The following topic is invalid: customers/redact »), car ce ne sont pas
# des topics de webhook classiques.
[webhooks.privacy_compliance]
customer_data_request_url = "https://app.xeyo.io/api/shopify/webhooks/customers-data-request"
customer_deletion_url = "https://app.xeyo.io/api/shopify/webhooks/customers-redact"
shop_deletion_url = "https://app.xeyo.io/api/shopify/webhooks/shop-redact"

# ── Désinstallation : purge du token et désactivation de la boutique ──────────
[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "/api/shopify/webhooks/app-uninstalled"
